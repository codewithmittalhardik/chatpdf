<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DocuGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #07050c;
            --card-bg: rgba(19, 16, 26, 0.85);
            --text-main: #e3dfec;
            --text-muted: rgba(161, 136, 222, 0.6);
            --accent: #6c37f1;
            --input-border: rgba(53, 22, 132, 0.5);
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        body.light-mode {
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #6366f1;
            --input-border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            z-index: -1;
            transition: opacity 0.5s ease;
        }

        body.light-mode .bg-mesh {
            opacity: 0.2;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,90%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,85%,1) 0, transparent 50%);
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
            transition: all 0.5s ease;
        }

        .input-style {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        body.light-mode .input-style {
            background: rgba(255, 255, 255, 0.5);
        }

        .input-style:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 87, 241, 0.2);
        }

        #themeIcon { transition: transform 0.5s ease; }
    </style>
</head>
<body class="font-sans px-4">

    <div class="bg-mesh"></div>

    <button onclick="toggleTheme()" class="absolute top-6 right-6 w-12 h-12 rounded-full glass-panel flex items-center justify-center text-xl cursor-pointer hover:scale-110 transition-all z-50" style="color: var(--accent)">
        <i id="themeIcon" class="ph-bold ph-moon-stars"></i>
    </button>

    <div class="w-full max-w-[420px] glass-panel rounded-[2.5rem] p-10 relative overflow-hidden">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl mb-4" style="background-color: var(--accent)">
                <i class="ph-bold ph-user-plus text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text-main)">Create Account</h1>
            <p class="text-sm mt-1 text-center" style="color: var(--text-muted)">Start chatting with your PDFs today</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-xl border flex items-center gap-2 text-xs font-medium" 
                         style="background: rgba(0,0,0,0.1); border-color: {% if category == 'error' %}#ef4444{% else %}#10b981{% endif %}; color: white;">
                        <i class="ph {% if category == 'error' %}ph-warning-circle{% else %}ph-check-circle{% endif %} text-lg"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 ml-1" style="color: var(--text-muted)">Choose Username</label>
                <input type="text" name="username" placeholder="Username" required 
                    class="w-full input-style rounded-2xl px-5 py-3.5 placeholder:opacity-30">
            </div>

            <div class="relative">
                <label class="block text-xs font-bold uppercase tracking-widest mb-2 ml-1" style="color: var(--text-muted)">Choose Password</label>
                <div class="relative">
                    <input id="password" type="password" name="password" placeholder="••••••••" required 
                        class="w-full input-style rounded-2xl px-5 py-3.5 placeholder:opacity-30">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity" style="color: var(--text-main)">
                        <i id="toggleIcon" class="ph ph-eye text-xl"></i>
                    </button>
                </div>
            </div>

            <button type="submit" 
                class="w-full text-white font-bold py-4 rounded-2xl shadow-lg transition-all hover:brightness-110 active:scale-[0.98]" 
                style="background-color: var(--accent)">
                Sign Up
            </button>
        </form>

        <p class="text-center text-sm mt-8" style="color: var(--text-muted)">
            Already have an account? 
            <a href="/login" class="font-bold hover:underline" style="color: var(--accent)">Log in</a>
        </p>
    </div>

    <footer class="mt-10 text-center">
        <div class="inline-flex items-center gap-2 px-4 py-2 glass-panel rounded-full">
            <span class="w-2 h-2 rounded-full animate-pulse" style="background-color: var(--accent)"></span>
            <p class="text-xs font-semibold tracking-wide uppercase" style="color: var(--text-muted)">
                Crafted by <span style="color: var(--accent)">Hardik Mittal</span>
            </p>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                icon.classList.replace('ph-moon-stars', 'ph-sun');
            } else {
                icon.classList.replace('ph-sun', 'ph-moon-stars');
            }
        }

        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('ph-eye', 'ph-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('ph-eye-slash', 'ph-eye');
            }
        }
    </script>
</body>
</html>
